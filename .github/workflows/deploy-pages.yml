# Nimmt die Pages-Vorschau offline: deployed nur noch eine leere Hinweisseite.
# Diese Datei wird nach dem Offline-Deploy entfernt.
name: Deploy preview to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - run: |
          mkdir -p site
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="de">
            <head><meta charset="utf-8"><title>Vorschau beendet</title></head>
            <body style="font-family: system-ui; display: grid; place-items: center; min-height: 100vh; margin: 0;">
              <p>Diese Vorschau ist nicht mehr verfügbar.</p>
            </body>
          </html>
          HTML
          cp site/index.html site/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
