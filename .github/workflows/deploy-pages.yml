# Temporäres Vorschau-Deployment auf GitHub Pages.
# URL: https://bxmbi10.github.io/webkrk/
# Zum Abschalten: Workflow-Datei entfernen oder Pages in den Repo-Settings deaktivieren.
name: Deploy preview to GitHub Pages

on:
  push:
    branches: [claude/kurok-architecture-site-ishdb6]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # --base, weil Pages unter /webkrk/ statt / ausliefert
      - run: npm run build -- --base=/webkrk/

      # SPA-Fallback: Pages liefert 404.html für unbekannte Pfade,
      # danach übernimmt der Client-Router
      - run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
